site_name: RustDesk Manager
site_description: Gestor de conexiones RustDesk - Documentación
site_author: abDatabase
site_url: https://github.com/abdatabase/rustdesk-manager

repo_name: angelbonet/rustdesk-manager
repo_url: https://github.com/angelbonet/rustdesk-manager

theme:
  name: material
  language: es
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: es

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Inicio: index.md
  - Guía de Usuario:
    - Instalación: guia/instalacion.md
    - Configuración inicial: guia/configuracion.md
    - Manual de uso: guia/manual.md
  - Servidor RustDesk:
    - Visión general: servidor/index.md
    - Instalación con Docker: servidor/docker.md
    - Configuración de red: servidor/red.md
    - HTTPS y seguridad: servidor/https.md
    - Mantenimiento: servidor/mantenimiento.md
  - Scripts de Despliegue:
    - Visión general: deployment/index.md
    - Instalación en macOS: deployment/macos.md
    - Instalación en Windows: deployment/windows.md
  - Desarrollo:
    - Estructura del proyecto: desarrollo/estructura.md
    - API REST: desarrollo/api.md
    - Contribuir: desarrollo/contribuir.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/angelbonet
    - icon: fontawesome/solid/globe
      link: https://abdatabase.com

copyright: Copyright &copy; 2026 abDatabase
